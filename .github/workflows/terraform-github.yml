name: Terraform — GitHub

on:
  push:
    branches: [main]
    paths:
      - terraform/github/**
  workflow_dispatch:
  workflow_call:

jobs:
  apply:
    name: Apply GitHub Infrastructure
    runs-on: ubuntu-latest
    environment: prod
    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      # TF_GITHUB_TOKEN is a PAT with org:admin scope.
      # GITHUB_TOKEN is the env var the Terraform GitHub provider reads.
      GITHUB_TOKEN:          ${{ secrets.TF_GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.13"

      - name: Write tfvars
        run: printf '%s' "$TFVARS_CONTENT" > terraform/github/terraform.tfvars
        env:
          TFVARS_CONTENT: ${{ secrets.GITHUB_TFVARS }}

      - name: Init
        run: terraform -chdir=terraform/github init

      - name: Select workspace
        run: terraform -chdir=terraform/github workspace select -or-create prod

      - name: Apply
        run: terraform -chdir=terraform/github apply -auto-approve -var-file=terraform.tfvars
